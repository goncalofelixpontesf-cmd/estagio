<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESMAD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --laranja:       #F15A24;
      --laranja-hover: #d94d1c;
      --preto:         #1A1A1A;
      --cinza-bg:      #F2F2F2;
      --cinza-input:   #EEEEEE;
      --cinza-texto:   #888888;
      --branco:        #FFFFFF;
      --vermelho:      #C00000;
      --verde-texto:   #375623;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cinza-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--laranja);
      padding: 14px 0;
      text-align: center;
    }
    .topbar h1 {
      color: var(--branco);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: var(--branco);
      border-radius: 16px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.08);
      padding: 48px 52px 52px;
      width: 100%;
      max-width: 456px;
    }

    .alerta {
      display: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.83rem;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .alerta.erro    { background: #FFDEDE; color: var(--vermelho); }
    .alerta.sucesso { background: #DFF0D8; color: var(--verde-texto); }
    .alerta.erro, .alerta.sucesso { display: block; }

    .campo { margin-bottom: 28px; }
    .campo label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--preto);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .input-wrap { position: relative; }
    .campo input {
      width: 100%;
      background: var(--cinza-input);
      border: 1.5px solid transparent;
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--preto);
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    }
    .campo input::placeholder { color: #BBBBBB; }
    .campo input:focus {
      background: var(--branco);
      border-color: var(--laranja);
      box-shadow: 0 0 0 3px rgba(241,90,36,0.12);
    }

    .btn-olho {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--cinza-texto);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      transition: color 0.15s;
      padding: 4px;
    }
    .btn-olho:hover { color: var(--preto); }

    .btn-principal {
      display: block;
      width: 100%;
      background: var(--laranja);
      color: var(--branco);
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.18s, transform 0.1s;
    }
    .btn-principal:hover   { background: var(--laranja-hover); }
    .btn-principal:active  { transform: scale(0.98); }
    .btn-principal:disabled { opacity: 0.65; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: girar 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    .link-redirecao {
      text-align: center;
      margin-top: 18px;
      font-size: 0.84rem;
      color: var(--cinza-texto);
    }
    .link-redirecao a {
      color: var(--laranja);
      font-weight: 700;
      text-decoration: none;
    }
    .link-redirecao a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .card { padding: 32px 24px 36px; }
      .topbar h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="topbar"><h1>ESMAD</h1></div>

  <div class="wrapper">
    <div class="card">

      <div id="alerta" class="alerta" role="alert"></div>

      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email"
          placeholder="exemplo@esmad.ipp.pt"
          autocomplete="email" inputmode="email">
      </div>

      <div class="campo">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password"
            placeholder="••••••••"
            autocomplete="current-password">
          <button type="button" class="btn-olho" id="btnOlho" tabindex="-1">ver</button>
        </div>
      </div>

      <button type="button" class="btn-principal" id="btnEntrar" onclick="entrar()">ENTRAR</button>

      <p class="link-redirecao">
        Não tem conta? <a href="registo.html">Registe-se aqui</a>
      </p>

    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000/api';

    // Se já tem sessão activa, redirecionar para a página correcta
    (function verificarSessao() {
      const token = localStorage.getItem('esmad_token');
      const user  = localStorage.getItem('esmad_user');
      if (!token || !user) return; // sem sessão, mostrar login normalmente
      try {
        const u = JSON.parse(user);
        redireccionarPorPerfil(u.perfil);
      } catch { localStorage.clear(); }
    })();

    // Redirecionar cada perfil para a página correta
    function redireccionarPorPerfil(perfil) {
      if (perfil === 'estudante') {
        window.location.replace('lista-propostas.html');
      } else if (perfil === 'docente' || perfil === 'entidade') {
        window.location.replace('dashboard-docente.html');
      } else if (perfil === 'comissao' || perfil === 'admin') {
        window.location.replace('gestao-cca.html');
      }
      // Se o perfil for desconhecido, não redirecionar — mostrar login
    }

    const inputPass = document.getElementById('password');
    document.getElementById('btnOlho').addEventListener('click', function () {
      const ver = inputPass.type === 'password';
      inputPass.type = ver ? 'text' : 'password';
      this.textContent = ver ? 'ocultar' : 'ver';
    });

    document.getElementById('email').addEventListener('keydown',    e => { if (e.key === 'Enter') entrar(); });
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });

    const alertaEl = document.getElementById('alerta');
    function mostrarAlerta(msg, tipo = 'erro') {
      alertaEl.textContent = msg;
      alertaEl.className = `alerta ${tipo}`;
    }

    const btnEntrar = document.getElementById('btnEntrar');

    async function entrar() {
      alertaEl.className = 'alerta';

      const email    = document.getElementById('email').value.trim();
      const password = inputPass.value;
      if (!email)    { mostrarAlerta('Introduza o seu email.');    return; }
      if (!password) { mostrarAlerta('Introduza a sua password.'); return; }

      btnEntrar.disabled = true;
      btnEntrar.innerHTML = '<span class="spin"></span>A entrar…';

      try {
        const resp  = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const dados = await resp.json();

        if (!dados.sucesso) throw new Error(dados.mensagem || 'Credenciais inválidas.');

        localStorage.setItem('esmad_token', dados.token);
        localStorage.setItem('esmad_user',  JSON.stringify(dados.utilizador));

        mostrarAlerta('Login com sucesso! A redirecionar…', 'sucesso');
        setTimeout(() => redireccionarPorPerfil(dados.utilizador.perfil), 900);

      } catch (err) {
        mostrarAlerta(err.message || 'Erro ao entrar. Tenta novamente.');
        btnEntrar.disabled = false;
        btnEntrar.textContent = 'ENTRAR';
      }
    }
  </script>
</body>
</html>
